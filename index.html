<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Square Survivor: Neon Colossus - Final Protocol</title>
    <style>
        body { margin: 0; background: #050505; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        canvas { display: block; background: radial-gradient(circle, #111 0%, #000 100%); }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.92); z-index: 10; }
        #hud { position: absolute; top: 15px; left: 15px; pointer-events: none; z-index: 5; display: none; }
        #xp-container { width: 250px; height: 10px; background: #222; border: 1px solid #444; margin-top: 5px; border-radius: 5px; overflow: hidden; }
        #xp-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #00ff88, #64ffda); box-shadow: 0 0 15px #00ff88; transition: width 0.2s; }
        #nova-container { width: 150px; height: 6px; background: #111; border: 1px solid #333; margin-top: 8px; border-radius: 3px; display: none; }
        #nova-bar { width: 100%; height: 100%; background: #fff; box-shadow: 0 0 10px #fff; transition: width 0.1s linear; }
        .menu-box { background: #0a0a0a; padding: 40px; border: 2px solid #333; text-align: center; border-radius: 20px; min-width: 400px; box-shadow: 0 0 40px rgba(0,255,136,0.1); }
        .upgrade-btn, .start-btn { display: block; width: 100%; padding: 14px; margin: 10px 0; background: #1a1a1a; color: white; border: 1px solid #444; cursor: pointer; font-weight: bold; border-radius: 8px; text-align: left; font-size: 16px; transition: 0.2s; }
        .start-btn { text-align: center; background: #00ff88; color: #000; border: none; font-size: 20px; text-transform: uppercase; letter-spacing: 2px; }
        .start-btn:hover { background: #fff; box-shadow: 0 0 30px #fff; transform: scale(1.05); }
        #load-btn { background: #ffeb3b; color: #000; display: none; margin-top: 5px; }
        .upgrade-btn:hover { background: #fff; color: black; box-shadow: 0 0 20px #fff; }
        .stat-val { float: right; color: #ffeb3b; font-size: 0.9em; font-family: monospace; }
        .hidden { display: none !important; }
        #dev-console { margin-top: 25px; border-top: 1px solid #333; padding-top: 15px; }
        #dev-input, #menu-dev-input { background: #000; border: 1px solid #444; color: #00ff88; padding: 10px; font-family: monospace; width: 90%; text-align: center; border-radius: 5px; outline: none; }
        kbd { background: #333; color: #fff; padding: 2px 6px; border-radius: 4px; border: 1px solid #555; }
        #auto-fire-msg { position: absolute; bottom: 20%; width: 100%; text-align: center; color: gold; font-weight: bold; font-size: 24px; pointer-events: none; opacity: 0; transition: opacity 0.5s; text-shadow: 0 0 10px gold; }
        #boss-hud { position: absolute; top: 30px; left: 50%; transform: translateX(-50%); width: 60%; display: none; flex-direction: column; align-items: center; z-index: 5; }
        #boss-name { color: #fff; font-weight: bold; text-transform: uppercase; margin-bottom: 5px; text-shadow: 0 0 15px #fff; letter-spacing: 4px; font-size: 18px; }
        #boss-hp-container { width: 100%; height: 16px; background: #111; border: 2px solid #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 0 20px rgba(255,255,255,0.3); }
        #boss-hp-bar { width: 100%; height: 100%; background: #fff; transition: width 0.1s ease-out; }
        .neon-text { color: #00ff88; text-shadow: 0 0 20px #00ff88; letter-spacing: 5px; margin-bottom: 10px; }
        
        /* New Difficulty Button Styles */
        .diff-container { display: flex; gap: 10px; margin-bottom: 20px; }
        .diff-btn { flex: 1; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; border: 1px solid #444; background: #111; color: white; transition: 0.2s; }
        .diff-btn:hover { background: #fff; color: #000; }
    </style>
</head>
<body>
    <div id="main-menu" class="overlay">
        <div class="menu-box" style="border-color: #00ff88;">
            <h1 class="neon-text">SQUARE SURVIVOR</h1>
            <p style="opacity: 0.6; margin-bottom: 5px;">NEON COLOSSUS PROTOCOL</p>
            <p id="high-score-text" style="color: #ffeb3b; font-weight: bold; margin-bottom: 15px;">BEST: 0</p>
            
            <p style="font-size: 12px; opacity: 0.6; margin-bottom: 8px; letter-spacing: 1px;">SELECT INTENSITY</p>
            <div class="diff-container">
                <button class="diff-btn" style="border-color: #00ff88;" onclick="startGame('easy')">EASY</button>
                <button class="diff-btn" style="border-color: #ffeb3b;" onclick="startGame('medium')">MEDIUM</button>
                <button class="diff-btn" style="border-color: #ff4444;" onclick="startGame('hard')">HARD</button>
            </div>

            <button id="load-btn" class="start-btn" onclick="loadGame()">Continue Mission</button>
            <div id="dev-console"><input type="text" id="menu-dev-input" placeholder="ACCESS SYSTEM..." autocomplete="off"></div>
        </div>
    </div>

    <div id="hud">
        <div style="font-size: 24px; font-weight: bold; color: #ffeb3b;">SCORE: <span id="score-val">0</span></div>
        <div style="margin-top: 5px; opacity: 0.8;">Level: <span id="lvl-val">1</span> | Shields: <span id="shield-val">0</span></div>
        <div id="diff-indicator" style="font-size: 10px; text-transform: uppercase; margin-top: 2px; letter-spacing: 1px;">Mode: Medium</div>
        <div id="xp-container"><div id="xp-bar"></div></div>
        <div id="nova-container">
            <div style="font-size: 10px; color: white; margin-bottom: 2px;">SUPERNOVA [SHIFT]</div>
            <div id="nova-bar"></div>
        </div>
        <div id="god-indicator" style="color: gold; font-weight: bold; display: none;">GOD MODE ACTIVE</div>
    </div>

    <div id="boss-hud"><div id="boss-name">White Colossus</div><div id="boss-hp-container"><div id="boss-hp-bar"></div></div></div>
    <div id="auto-fire-msg">AUTO-FIRE UNLOCKED</div>

    <div id="upgrade-menu" class="overlay hidden">
        <div class="menu-box" style="border-color: #00ff88;">
            <h1 id="menu-title" style="color: #00ff88; margin-top:0;">EVOLVE</h1>
            <div id="upgrade-list"></div>
            <div id="dev-console"><input type="text" id="dev-input" placeholder="ACCESS SYSTEM..." autocomplete="off"></div>
        </div>
    </div>

    <div id="pause-menu" class="overlay hidden">
        <div class="menu-box" style="border-color: #ffeb3b;">
            <h1>PAUSED</h1>
            <p><kbd>ESC</kbd> Resume | <kbd>SHIFT</kbd> Save & Quit</p>
        </div>
    </div>

    <div id="death-menu" class="overlay hidden">
        <div class="menu-box" style="border-color: #ff4444;">
            <h1 style="color: #ff4444;">SQUARE DESTROYED</h1>
            <button class="upgrade-btn" style="text-align:center" onclick="location.reload()">RESTART</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
// --- AUDIO ---
const AudioEngine = {
    ctx: new (window.AudioContext || window.webkitAudioContext)(),
    isMusicPlaying: false,
    playShoot() { try { const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain(); osc.type = 'square'; osc.frequency.setValueAtTime(150, this.ctx.currentTime); osc.frequency.exponentialRampToValueAtTime(40, this.ctx.currentTime + 0.1); gain.gain.setValueAtTime(0.04, this.ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.1); osc.connect(gain); gain.connect(this.ctx.destination); osc.start(); osc.stop(this.ctx.currentTime + 0.1); } catch(e){} },
    playExplode() { try { const bufSize = this.ctx.sampleRate * 0.2; const buffer = this.ctx.createBuffer(1, bufSize, this.ctx.sampleRate); const data = buffer.getChannelData(0); for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1; const noise = this.ctx.createBufferSource(); noise.buffer = buffer; const gain = this.ctx.createGain(); gain.gain.setValueAtTime(0.08, this.ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.2); noise.connect(gain); gain.connect(this.ctx.destination); noise.start(); } catch(e){} },
    playGem() { try { const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain(); osc.type = 'sine'; osc.frequency.setValueAtTime(800, this.ctx.currentTime); osc.frequency.exponentialRampToValueAtTime(1200, this.ctx.currentTime + 0.05); gain.gain.setValueAtTime(0.03, this.ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.05); osc.connect(gain); gain.connect(this.ctx.destination); osc.start(); osc.stop(this.ctx.currentTime + 0.05); } catch(e){} },
    playClick() { try { const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain(); osc.type = 'sine'; osc.frequency.setValueAtTime(1200, this.ctx.currentTime); gain.gain.setValueAtTime(0.05, this.ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.05); osc.connect(gain); gain.connect(this.ctx.destination); osc.start(); osc.stop(this.ctx.currentTime + 0.05); } catch(e){} },
    playLevelUp() { [440, 554, 659, 880].forEach((f, i) => { const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain(); osc.frequency.value = f; gain.gain.setValueAtTime(0.05, this.ctx.currentTime + i * 0.1); gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + i * 0.1 + 0.2); osc.connect(gain); gain.connect(this.ctx.destination); osc.start(this.ctx.currentTime + i * 0.1); osc.stop(this.ctx.currentTime + i * 0.1 + 0.2); }); },
    startMusic() { if (this.isMusicPlaying) return; this.isMusicPlaying = true; let step = 0; const scale = [110, 130.8, 146.8, 164.8, 196, 220]; setInterval(() => { if (gameState !== "PLAYING") return; if (step % 8 === 0) this.playTone(scale[0], 'sawtooth', 0.03, 1.2, 300); if (Math.random() > 0.7) { const note = scale[Math.floor(Math.random() * scale.length)] * 4; this.playTone(note, 'sine', 0.015, 0.8, 1500); } step++; }, 200); },
    playTone(freq, type, vol, duration, filterFreq = 1000) { const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain(); const filter = this.ctx.createBiquadFilter(); osc.type = type; osc.frequency.value = freq; filter.type = "lowpass"; filter.frequency.value = filterFreq; gain.gain.setValueAtTime(vol, this.ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duration); osc.connect(filter); filter.connect(gain); gain.connect(this.ctx.destination); osc.start(); osc.stop(this.ctx.currentTime + duration); }
};

// --- GLOBALS ---
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
let gameState = "MENU", score = 0, highScore = parseInt(localStorage.getItem('sqHi')) || 0, screenShake = 0;
let lastAutoShot = 0, shieldRotation = 0, isGodMode = false, autoFireNotified = false, spaceHeld = false, rapidUpgrades = 0, bossActive = false, bossCount = 0;
let player = { x: canvas.width/2, y: canvas.height/2, size: 24, speed: 4.2, xp: 0, nextLevel: 10, level: 1, facingAngle: -Math.PI/2, trail: [], shields: 0, hasNova: false, lastNovaTime: 0, novaCooldown: 30000 };
let camera = { x: 0, y: 0 }, stats = { rapid: 250, size: 2.2, damage: 1, dmgLvl: 0, multi: 1, boom: 0, magnet: 70, agility: 4.2, critChance: 0 };
let spawnConfig = { lastSpawnTime: 0, baseInterval: 2800 }; 
let keys = {}, bullets = [], enemyBullets = [], enemies = [], gems = [], explosions = [];
const damageColors = ["#fffb00", "#ff9100", "#ff4d00", "#ff0055", "#aa00ff", "#00f2ff", "#00ff88", "#ffffff"];

// --- DIFFICULTY SETTINGS ---
let currentDifficulty = "medium";
const diffSettings = {
    easy:   { hpMult: 0.6, speedMult: 0.75, spawnMult: 1.4, color: "#00ff88" },
    medium: { hpMult: 1.0, speedMult: 1.0,  spawnMult: 1.0, color: "#ffeb3b" },
    hard:   { hpMult: 1.5, speedMult: 1.2,  spawnMult: 0.7, color: "#ff4444" }
};

// --- PERSISTENCE ---
function saveGame() { localStorage.setItem('sqSave', JSON.stringify({ player, stats, score, rapidUpgrades, autoFireNotified, currentDifficulty })); alert("MISSION RECORDED."); location.reload(); }
function loadGame() { AudioEngine.playClick(); const data = JSON.parse(localStorage.getItem('sqSave')); if (!data) return; player = data.player; stats = data.stats; score = data.score; rapidUpgrades = data.rapidUpgrades; autoFireNotified = data.autoFireNotified; currentDifficulty = data.currentDifficulty || "medium"; player.trail = []; enemies = []; bullets = []; gems = []; document.getElementById('score-val').innerText = score; document.getElementById('lvl-val').innerText = player.level; document.getElementById('shield-val').innerText = player.shields; document.getElementById('xp-bar').style.width = (player.xp / player.nextLevel * 100) + '%'; if (player.hasNova) document.getElementById('nova-container').style.display = 'block'; startGame(currentDifficulty); }
function updateHi() { if(score > highScore) { highScore = score; localStorage.setItem('sqHi', highScore); } document.getElementById('high-score-text').innerText = "BEST: " + highScore.toLocaleString(); }
updateHi();
if(localStorage.getItem('sqSave')) document.getElementById('load-btn').style.display = 'block';

// --- LOGIC ---
function checkDevCode(val, inputElement) { if (val.toLowerCase() === 'i am christopher') { isGodMode = true; inputElement.style.borderColor = "gold"; inputElement.value = "GOD MODE ACTIVE"; inputElement.blur(); document.getElementById('god-indicator').style.display = 'block'; if (gameState === "UPGRADE") refreshUpgradeMenu(); } }
document.getElementById('dev-input').addEventListener('input', (e) => checkDevCode(e.target.value, e.target));
document.getElementById('menu-dev-input').addEventListener('input', (e) => checkDevCode(e.target.value, e.target));

function startGame(mode) { 
    if(mode) currentDifficulty = mode;
    const diffDisplay = document.getElementById('diff-indicator');
    diffDisplay.innerText = "Mode: " + currentDifficulty;
    diffDisplay.style.color = diffSettings[currentDifficulty].color;
    
    AudioEngine.playClick(); 
    gameState = "PLAYING"; 
    document.getElementById('main-menu').classList.add('hidden'); 
    document.getElementById('hud').style.display = 'block'; 
    if (AudioEngine.ctx.state === 'suspended') AudioEngine.ctx.resume(); 
    AudioEngine.startMusic(); 
}

window.addEventListener('keydown', e => { if (gameState === "MENU") return; if (e.code === 'Escape') { togglePause(); return; } if (isGodMode) { if (e.code === 'KeyL') { triggerLevelUp(); return; } if (e.code === 'KeyS') { killPlayer(); return; } if (e.code === 'Tab') { e.preventDefault(); if (gameState === "UPGRADE") { gameState = "PLAYING"; document.getElementById('upgrade-menu').classList.add('hidden'); } else showUpgradeMenu(); return; } } if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') { if (gameState === "PAUSED") saveGame(); else useSupernova(); return; } if (e.code === 'Space' && gameState === "PLAYING") { if (!spaceHeld) { spaceHeld = true; if (Date.now() - lastAutoShot > stats.rapid) { shoot(); lastAutoShot = Date.now(); } } } keys[e.code] = true; updateFacing(); });
window.addEventListener('keyup', e => { if (e.code === 'Space') spaceHeld = false; keys[e.code] = false; updateFacing(); });
function togglePause() { if (gameState === "DEAD" || gameState === "UPGRADE" || gameState === "MENU") return; gameState = (gameState === "PLAYING") ? "PAUSED" : "PLAYING"; document.getElementById('pause-menu').classList.toggle('hidden', gameState !== "PAUSED"); }
function updateFacing() { let dx=0, dy=0; if(keys['ArrowUp'])dy-=1; if(keys['ArrowDown'])dy+=1; if(keys['ArrowLeft'])dx-=1; if(keys['ArrowRight'])dx+=1; if(dx!==0||dy!==0) player.facingAngle = Math.atan2(dy,dx); }
function shoot() { AudioEngine.playShoot(); const isCrit = (Math.random() * 100) < stats.critChance; const bColor = isCrit ? "#ffffff" : damageColors[Math.min(stats.dmgLvl, damageColors.length - 1)]; for (let i = 0; i < stats.multi; i++) { let spread = (i - (stats.multi-1)/2) * 0.18; bullets.push({ x: player.x + player.size/2, y: player.y + player.size/2, vx: Math.cos(player.facingAngle + spread) * 12, vy: Math.sin(player.facingAngle + spread) * 12, size: isCrit ? stats.size * 1.5 : stats.size, damage: isCrit ? stats.damage * 4 : stats.damage, color: bColor, isCrit: isCrit }); } }

function handleEnemySpawning(now) {
    if (gameState !== "PLAYING") return;
    
    // Apply difficulty multiplier to spawn timing (Hard = lower mult = faster spawns)
    let currentInterval = Math.max(100, (spawnConfig.baseInterval * Math.pow(0.85, player.level)) * diffSettings[currentDifficulty].spawnMult); 
    let maxEnemies = 10 + Math.floor(Math.pow(player.level, 1.5)); 
    
    if (now - spawnConfig.lastSpawnTime > currentInterval && enemies.length < maxEnemies) {
        let spawnChoices = [{type: 'green', weight: 100, unlockAt: 1}];
        if (player.level >= 3) spawnChoices.push({type: 'pink', weight: 45, unlockAt: 3});
        if (player.level >= 4) spawnChoices.push({type: 'yellow', weight: 35, unlockAt: 4});
        if (player.level >= 5) spawnChoices.push({type: 'blue', weight: 25, unlockAt: 5});
        if (player.level >= 7) spawnChoices.push({type: 'ghost', weight: 20, unlockAt: 7});
        if (player.level >= 12) spawnChoices.push({type: 'orbital', weight: 15, unlockAt: 12});
        if (player.level >= 18) spawnChoices.push({type: 'shielded', weight: 12, unlockAt: 18});
        if (player.level >= 22) spawnChoices.push({type: 'buffer', weight: 10, unlockAt: 22});
        if (player.level >= 10) spawnChoices.push({type: 'purple', weight: 15, unlockAt: 10});
        if (player.level >= 15) spawnChoices.push({type: 'red', weight: 20, unlockAt: 15});
        if (player.level >= 20) spawnChoices.push({type: 'orange', weight: 15, unlockAt: 20});
        if (player.level >= 25) spawnChoices.push({type: 'grey', weight: 12, unlockAt: 25});
        if (player.level >= 35) spawnChoices.push({type: 'black', weight: 10, unlockAt: 35}); 
        if (player.level >= 40) spawnChoices.push({type: 'darkgreen', weight: 6, unlockAt: 40});
        let totalW = spawnChoices.reduce((s, c) => s + c.weight, 0);
        let rand = Math.random() * totalW, selected = spawnChoices[0], cumulative = 0;
        for (let c of spawnChoices) { cumulative += c.weight; if (rand <= cumulative) { selected = c; break; } }
        let x, y, side = Math.floor(Math.random() * 4);
        if (side === 0) { x = player.x - 800; y = player.y + (Math.random()*1000-500); }
        else if (side === 1) { x = player.x + 800; y = player.y + (Math.random()*1000-500); }
        else if (side === 2) { y = player.y - 800; x = player.x + (Math.random()*1000-500); }
        else { y = player.y + 800; x = player.x + (Math.random()*1000-500); }
        let color, radius, hp, speed, scoreVal, behavior = "linear", tier = 1;
        switch(selected.type) {
            case 'orbital': color = '#00ffcc'; radius = 15; hp = 8; speed = 2.5; scoreVal = 800; behavior = "orbital"; break;
            case 'shielded': color = '#8B4513'; radius = 22; hp = 15; speed = 1.2; scoreVal = 1500; behavior = "shielded"; break;
            case 'ghost': color = 'rgba(255,255,255,0.3)'; radius = 18; hp = 6; speed = 2.0; scoreVal = 1000; behavior = "ghost"; break;
            case 'buffer': color = '#99ff33'; radius = 45; hp = 80; speed = 0.6; scoreVal = 4000; behavior = "buffer"; break;
            case 'pink': color = '#ff66cc'; radius = 22; hp = 4; speed = 1.3; scoreVal = 400; break;
            case 'yellow': color = '#ffff00'; radius = 18; hp = 6; speed = 2.2; scoreVal = 600; behavior = "zigzag"; break;
            case 'red': color = '#ff0000'; radius = 20; hp = 8; speed = 3.2; scoreVal = 1200; break;
            case 'black': color = '#000000'; radius = 35; hp = 180; speed = 0.5; scoreVal = 5000; behavior = "sniper"; break;
            case 'grey': color = '#888888'; radius = 60; hp = 220; speed = 0.6; scoreVal = 3000; tier = 3; break;
            case 'darkgreen': color = '#004d00'; radius = 55; hp = 250; speed = 0.5; scoreVal = 8000; break;
            case 'orange': color = '#ff6600'; radius = 18; hp = 4; speed = 1.6; scoreVal = 1500; behavior = "bomber"; break;
            case 'purple': color = '#aa00ff'; radius = 40; hp = 50; speed = 0.5; scoreVal = 3000; break;
            case 'blue': color = '#00bbff'; radius = 28; hp = 15; speed = 0.8; scoreVal = 1000; break;
            default: color = '#44ff44'; radius = 18; hp = 2; speed = 1.1; scoreVal = 100; break;
        }
        
        let levelsSinceUnlock = Math.max(0, player.level - selected.unlockAt);
        
        // APPLY DIFFICULTY MODIFIERS TO HP AND SPEED
        hp *= (1 + (levelsSinceUnlock * 0.15)) * diffSettings[currentDifficulty].hpMult; 
        speed = Math.min(9.0, speed * (1 + (levelsSinceUnlock * 0.02)) * diffSettings[currentDifficulty].speedMult); 
        
        enemies.push({ x, y, radius, hp, maxHp: hp, speed, baseSpeed: speed, color, baseColor: color, scoreVal, type: selected.type, behavior, tier, lastShot: now, offset: Math.random() * 1000, state: 0, unlockAt: selected.unlockAt, isBuffed: false });
        spawnConfig.lastSpawnTime = now;
    }
}

function checkSplit(en) { if (en.type === 'grey' && en.tier > 1) { for (let i = 0; i < 2; i++) { enemies.push({ x: en.x + (Math.random()*30-15), y: en.y + (Math.random()*30-15), radius: en.radius*0.6, hp: en.maxHp*0.45, maxHp: en.maxHp*0.45, speed: Math.min(9, en.speed*1.2), baseSpeed: en.speed*1.2, color: '#888888', baseColor: '#888888', scoreVal: en.scoreVal*0.5, type: 'grey', behavior: 'linear', tier: en.tier-1, offset: Math.random()*1000, unlockAt: en.unlockAt, isBuffed: false }); } } }
function spawnGem(en) { if (en.type === 'boss') { for (let i=0; i<5; i++) gems.push({ x: en.x+(Math.random()*60-30), y: en.y+(Math.random()*60-30), vx: 0, vy: 0, color: '#ffffff', type: 'upgrade' }); bossActive = false; document.getElementById('boss-hud').style.display = 'none'; return; } let xp = 1, gemColor = en.baseColor; const xpVals = { pink:3, yellow:5, blue:12, red:15, purple:20, orange:30, darkgreen:50, grey:60, black:100, orbital:10, ghost:12, shielded:15, buffer:40 }; if (xpVals[en.type]) xp = xpVals[en.type]; gems.push({ x: en.x, y: en.y, vx: 0, vy: 0, color: gemColor, xp, type: 'xp' }); }
function triggerLevelUp() { player.level++; player.xp=0; player.nextLevel=10+(player.level*8); document.getElementById('lvl-val').innerText=player.level; AudioEngine.playLevelUp(); if(player.level%10===0 && !bossActive) spawnBoss(); else showUpgradeMenu(); }
function spawnBoss() { bossActive=true; bossCount++; let bossHp = 400 * Math.pow(1.15, bossCount - 1) * diffSettings[currentDifficulty].hpMult; enemies.push({ x:player.x+600, y:player.y, radius:120, hp:bossHp, maxHp:bossHp, speed:0.4, color:'#ffffff', baseColor:'#ffffff', scoreVal:20000, type:'boss', behavior:'linear', unlockAt: player.level, isBuffed: false }); document.getElementById('boss-hud').style.display='flex'; }
function killPlayer() { gameState="DEAD"; updateHi(); localStorage.removeItem('sqSave'); document.getElementById('death-menu').classList.remove('hidden'); }
function useSupernova() { if(!player.hasNova || Date.now()-player.lastNovaTime < player.novaCooldown) return; player.lastNovaTime=Date.now(); AudioEngine.playExplode(); screenShake = 30; explosions.push({x:player.x+player.size/2, y:player.y+player.size/2, r:0, maxR:2000, alpha:1, color:'#fff'}); enemies=[]; enemyBullets=[]; if(bossActive){bossActive=false;document.getElementById('boss-hud').style.display='none';} }

function update() {
    const now = Date.now();
    if (gameState === "MENU") { draw(); requestAnimationFrame(update); return; }
    if (gameState !== "PLAYING") { requestAnimationFrame(update); return; }
    handleEnemySpawning(now);
    shieldRotation += 0.05;
    if (player.hasNova) { let perc = Math.min(1, (now - player.lastNovaTime) / player.novaCooldown); document.getElementById('nova-bar').style.width = (perc * 100) + '%'; }
    player.trail.push({x:player.x, y:player.y, alpha: 0.4}); if(player.trail.length>8) player.trail.shift();
    if(keys['ArrowUp'])player.y-=player.speed; if(keys['ArrowDown'])player.y+=player.speed;
    if(keys['ArrowLeft'])player.x-=player.speed; if(keys['ArrowRight'])player.x+=player.speed;
    if(spaceHeld && now-lastAutoShot > stats.rapid && (rapidUpgrades>0||isGodMode)) { shoot(); lastAutoShot=now; }
    camera.x = player.x-canvas.width/2; camera.y = player.y-canvas.height/2;
    bullets.forEach((b,bi)=>{ b.x+=b.vx; b.y+=b.vy; if(Math.abs(b.x-player.x)>2000) bullets.splice(bi,1); });
    enemyBullets.forEach((eb, ebi) => { eb.x += eb.vx; eb.y += eb.vy; let dx = (player.x + player.size/2) - eb.x, dy = (player.y + player.size/2) - eb.y, dist = Math.sqrt(dx*dx + dy*dy); if (dist < eb.size + player.size/2) { if (!isGodMode) { if (player.shields > 0) { player.shields--; document.getElementById('shield-val').innerText = player.shields; } else killPlayer(); } enemyBullets.splice(ebi, 1); } });
    enemies.forEach(e => { e.isBuffed = false; e.speed = e.baseSpeed; });
    enemies.forEach((en,ei)=>{
        if (en.type === 'boss') { document.getElementById('boss-hp-bar').style.width = (en.hp/en.maxHp * 100) + '%'; }
        let dx=(player.x+player.size/2)-en.x, dy=(player.y+player.size/2)-en.y, dist=Math.sqrt(dx*dx+dy*dy);
        let moveX=dx/dist, moveY=dy/dist;
        if(en.behavior==="zigzag"){ let wave = Math.sin(now/100 + en.offset) * 2.2; let perpX = -moveY, perpY = moveX; moveX += perpX * wave; moveY += perpY * wave; }
        if(en.behavior==="orbital") { let angle = Math.atan2(dy, dx) + 0.02; let targetX = (player.x + player.size/2) - Math.cos(angle) * 300; let targetY = (player.y + player.size/2) - Math.sin(angle) * 300; moveX = (targetX - en.x) / 50; moveY = (targetY - en.y) / 50; if(dist < 400) { player.x -= moveX * 0.5; player.y -= moveY * 0.5; } }
        if(en.behavior==="ghost") { en.state = Math.sin(now/500); en.isInvulnerable = Math.abs(en.state) < 0.2; }
        if(en.behavior==="shielded") { en.shieldAngle = Math.atan2(dy, dx); }
        if(en.behavior==="buffer") { enemies.forEach(other => { if(other !== en && Math.sqrt((en.x-other.x)**2 + (en.y-other.y)**2) < 200) { other.isBuffed = true; other.speed = other.baseSpeed * 1.5; } }); }
        if(en.behavior==="sniper" && dist < 450) { moveX = 0; moveY = 0; let fireInterval = Math.max(800, 3000 - (player.level * 50)); if (now - en.lastShot > fireInterval * 0.7) { en.color = (Math.floor(now/50)%2===0) ? '#aa00ff' : '#000000'; } else en.color = en.baseColor; if(now-en.lastShot > fireInterval) { en.lastShot=now; for(let i=0;i<6;i++){ let a=(Math.PI*2/6)*i; enemyBullets.push({x:en.x,y:en.y,vx:Math.cos(a)*6,vy:Math.sin(a)*6,size:12}); } AudioEngine.playShoot(); } }
        if(en.type==='orange' && dist < 130) { if(!en.isPriming){en.isPriming=true; en.primeStart=now;} en.speed=0; en.color=(Math.floor(now/80)%2===0)?'#fff':en.baseColor; if(dist<45||(now-en.primeStart>1500)){AudioEngine.playExplode(); screenShake = 15; explosions.push({x:en.x,y:en.y,r:10,maxR:160,alpha:1,color:'#ff6600'});if(!isGodMode&&dist<160){if(player.shields>0){player.shields--;document.getElementById('shield-val').innerText=player.shields;}else killPlayer();} enemies.splice(ei,1); return;} }
        en.x+=moveX*en.speed; en.y+=moveY*en.speed;
        if(dist < en.radius+player.size/2) { if(isGodMode){checkSplit(en);spawnGem(en);score+=en.scoreVal;enemies.splice(ei,1);} else if(player.shields>0){player.shields--;document.getElementById('shield-val').innerText=player.shields;checkSplit(en);enemies.splice(ei,1);} else killPlayer(); }
        bullets.forEach((b,bi)=>{ if(Math.sqrt((b.x-en.x)**2+(b.y-en.y)**2)<en.radius+b.size){ if(en.isInvulnerable) return; if(en.behavior === "shielded") { let angleToBullet = Math.atan2(b.y - en.y, b.x - en.x); let diff = Math.abs(angleToBullet - en.shieldAngle); if(diff < 0.8 || diff > Math.PI*2 - 0.8) { bullets.splice(bi,1); return; } } en.hp-=b.damage; bullets.splice(bi,1); } });
        if(en.hp<=0){ AudioEngine.playExplode(); checkSplit(en); spawnGem(en); enemies.splice(ei,1); score+=en.scoreVal; document.getElementById('score-val').innerText=score; }
    });
    gems.forEach((g,gi)=>{ let dx=(player.x+player.size/2)-g.x, dy=(player.y+player.size/2)-g.y, dist=Math.sqrt(dx*dx+dy*dy); if(dist<stats.magnet){ g.x+=(dx/dist)*12; g.y+=(dy/dist)*12; } if(dist<25){ AudioEngine.playGem(); if(g.type==='upgrade') showUpgradeMenu(); else player.xp+=g.xp; if(player.xp>=player.nextLevel) triggerLevelUp(); gems.splice(gi,1); document.getElementById('xp-bar').style.width=(player.xp/player.nextLevel*100)+'%'; } });
    explosions.forEach((ex,i)=>{ ex.r+=12; ex.alpha-=0.05; if(ex.alpha<=0) explosions.splice(i,1); });
    if (screenShake > 0) screenShake *= 0.9; else screenShake = 0;
    draw();
    requestAnimationFrame(update);
}

function draw() {
    const now = Date.now();
    ctx.clearRect(0,0,canvas.width,canvas.height); ctx.save();
    if (screenShake > 0) ctx.translate(Math.random()*screenShake-screenShake/2, Math.random()*screenShake-screenShake/2);
    ctx.translate(-camera.x, -camera.y);
    ctx.strokeStyle="rgba(40,40,40,0.5)"; ctx.lineWidth=1;
    for(let x=Math.floor(camera.x/100)*100; x<camera.x+canvas.width+100; x+=100){ctx.beginPath();ctx.moveTo(x,camera.y);ctx.lineTo(x,camera.y+canvas.height);ctx.stroke();}
    for(let y=Math.floor(camera.y/100)*100; y<camera.y+canvas.height+100; y+=100){ctx.beginPath();ctx.moveTo(camera.x,y);ctx.lineTo(camera.x+canvas.width,y);ctx.stroke();}
    player.trail.forEach((t,i)=>{ ctx.fillStyle=isGodMode?`rgba(255,215,0,${t.alpha*(i/8)})`:`rgba(255,0,0,${t.alpha*(i/8)})`; ctx.fillRect(t.x,t.y,player.size,player.size); });
    ctx.shadowBlur=15; ctx.shadowColor=isGodMode?"gold":"red"; ctx.fillStyle=isGodMode?"gold":"red"; ctx.fillRect(player.x,player.y,player.size,player.size);
    if(player.shields>0||isGodMode){ ctx.save(); ctx.translate(player.x+player.size/2,player.y+player.size/2); ctx.rotate(shieldRotation); ctx.strokeStyle=isGodMode?"gold":"#00e5ff"; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(0,0,player.size*1.6,0,isGodMode?Math.PI*2:Math.PI*0.4); ctx.stroke(); ctx.restore(); }
    enemies.forEach(en=>{
        let finalColor = en.baseColor;
        if(en.behavior === "ghost") { finalColor = `rgba(255, 255, 255, ${Math.abs(en.state)})`; } else if(en.isBuffed) { let flash = Math.sin(now/150); finalColor = flash > 0 ? "white" : en.baseColor; } else if(en.type === "orange" && en.isPriming) { finalColor = (Math.floor(now/80)%2===0) ? "#fff" : en.baseColor; } else if(en.behavior === "sniper") { finalColor = en.color; }
        ctx.shadowBlur=10; ctx.shadowColor=finalColor; ctx.fillStyle=finalColor; ctx.beginPath(); ctx.arc(en.x,en.y,en.radius,0,Math.PI*2); ctx.fill();
        if(en.behavior === "shielded") { ctx.strokeStyle = "white"; ctx.lineWidth = 4; ctx.beginPath(); ctx.arc(en.x, en.y, en.radius + 5, en.shieldAngle - 0.8, en.shieldAngle + 0.8); ctx.stroke(); }
        if(en.behavior === "buffer") { ctx.strokeStyle = "rgba(153, 255, 51, 0.2)"; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(en.x, en.y, 200, 0, Math.PI*2); ctx.stroke(); }
        if (en.type !== 'boss') { ctx.shadowBlur=0; ctx.fillStyle="#222"; ctx.fillRect(en.x-en.radius, en.y-en.radius-12, en.radius*2, 5); ctx.fillStyle="#ff3333"; ctx.fillRect(en.x-en.radius, en.y-en.radius-12, (en.radius*2)*(en.hp/en.maxHp), 5); }
    });
    gems.forEach(g=>{ctx.shadowBlur=10;ctx.shadowColor=g.color;ctx.fillStyle=g.color;ctx.beginPath();ctx.arc(g.x,g.y,8,0,Math.PI*2);ctx.fill();});
    bullets.forEach(b=>{ctx.shadowBlur=10;ctx.shadowColor=b.color;ctx.fillStyle=b.color;ctx.beginPath();ctx.arc(b.x,b.y,b.size,0,Math.PI*2);ctx.fill();});
    enemyBullets.forEach(eb=>{ctx.shadowBlur=15;ctx.shadowColor="#aa00ff";ctx.fillStyle="#000";ctx.beginPath();ctx.arc(eb.x,eb.y,12,0,Math.PI*2);ctx.fill();});
    explosions.forEach(ex=>{ctx.beginPath();ctx.arc(ex.x,ex.y,ex.r,0,Math.PI*2);ctx.fillStyle=ex.color+"44";ctx.fill();});
    ctx.restore();
}

function refreshUpgradeMenu() {
    const list=document.getElementById('upgrade-list'); list.innerHTML='';
    const opts=[{id:'rapid',n:'Rapid Fire',v:(1000/stats.rapid).toFixed(1)+"/s"},{id:'size',n:'Bullet Size',v:stats.size.toFixed(1)},{id:'damage',n:'Damage',v:stats.damage.toFixed(1)},{id:'multi',n:'Multishot',v:stats.multi},{id:'boom',n:'Explosions',v:stats.boom},{id:'magnet',n:'Magnetism',v:stats.magnet},{id:'agility',n:'Agility',v:stats.agility.toFixed(1)},{id:'shield',n:'Shield',v:player.shields},{id:'crit',n:'Crit %',v:stats.critChance}];
    if(player.level>=15 && !player.hasNova) opts.push({id:'nova',n:'SUPERNOVA',v:''});
    opts.forEach(o=>{
        let btn=document.createElement('button'); btn.className='upgrade-btn'; btn.innerHTML=`${o.n} <span class="stat-val">${o.v}</span>`;
        btn.onclick=()=>{
            AudioEngine.playClick();
            if(o.id==='rapid'){rapidUpgrades++; stats.rapid*=0.82; if(!autoFireNotified){autoFireNotified=true;document.getElementById('auto-fire-msg').style.opacity='1';setTimeout(()=>document.getElementById('auto-fire-msg').style.opacity='0',3000);}}
            if(o.id==='size')stats.size+=1.8; if(o.id==='damage'){stats.damage+=2.2;stats.dmgLvl++;} if(o.id==='multi')stats.multi++; if(o.id==='boom')stats.boom+=25; if(o.id==='magnet')stats.magnet+=70; 
            if(o.id==='agility'){player.speed*=1.12;stats.agility=player.speed;} 
            if(o.id==='shield'){player.shields++;document.getElementById('shield-val').innerText=player.shields;} if(o.id==='crit')stats.critChance+=5; if(o.id==='nova'){player.hasNova=true;document.getElementById('nova-container').style.display='block';}
            if(isGodMode) refreshUpgradeMenu(); else { gameState="PLAYING"; document.getElementById('upgrade-menu').classList.add('hidden'); document.activeElement.blur(); }
        };
        list.appendChild(btn);
    });
}
function showUpgradeMenu() { gameState="UPGRADE"; refreshUpgradeMenu(); document.getElementById('upgrade-menu').classList.remove('hidden'); }
update();
</script>
